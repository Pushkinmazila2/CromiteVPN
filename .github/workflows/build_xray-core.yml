name: Stage 1 - Build Xray AAR

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      package_suffix:
        description: 'Package suffix (random if empty)'
        required: false
        default: ''
  push:
    paths:
      - '.github/workflows/build_xray-core.yml'

jobs:
  build-xray:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate package name
        id: identity
        run: |
          SUFFIX="${{ inputs.package_suffix }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX=$(head -c 100 /dev/urandom | tr -dc 'a-z' | head -c 8)
          fi
          PACKAGE="com.${SUFFIX}.browser"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Package: ${PACKAGE}"

      - name: Build Docker image
        run: |
          sudo docker rmi xray-builder:latest || true
          sudo docker build -t xray-builder:latest xray-bridge/

      - name: Build Xray AAR
        run: |
          sudo docker run --rm \
            -v "$(pwd)/xray-bridge:/build" \
            -e PACKAGE_NAME="${{ steps.identity.outputs.package }}" \
            xray-builder:latest \
            bash -c "
              set -e

              echo '=== ENV ===' &&
              echo GOPATH=\$GOPATH &&
              echo GOROOT=\$(go env GOROOT) &&
              echo GOMODCACHE=\$(go env GOMODCACHE) &&
              go version &&
              gomobile version &&

              echo '=== mobile/bind location ===' &&
              find \$GOPATH -path '*/mobile/bind' -type d 2>/dev/null || echo 'NOT FOUND in GOPATH' &&
              find /root -path '*/mobile/bind' -type d 2>/dev/null || echo 'NOT FOUND in /root' &&

              echo '=== go env ===' &&
              go env &&

              echo '=== go mod tidy ===' &&
              go mod tidy &&

              echo '=== mobile/bind after tidy ===' &&
              find \$(go env GOMODCACHE) -path '*/mobile*/bind' -type d 2>/dev/null || echo 'still not found' &&

              echo '=== gomobile init ===' &&
              gomobile init -v &&

              echo '=== mobile/bind after init ===' &&
              find \$(go env GOMODCACHE) -path '*/mobile*/bind' -type d 2>/dev/null &&

              echo '=== gomobile bind ===' &&
              gomobile bind \
                -target=android/arm64 \
                -androidapi 21 \
                -ldflags \"-X xraymobile.appPackageName=\${PACKAGE_NAME}\" \
                -v \
                -o xraymobile.aar \
                .
            "
          du -sh xray-bridge/xraymobile.aar

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: xraymobile-aar
          path: xray-bridge/xraymobile.aar
          retention-days: 7
      
      - name: Send Telegram notification
        if: always()
        run: |
          MESSAGE="Статус Action: ${{ job.status }}
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Подробнее: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "http://${{ secrets.MYSECRET_IP}}:8080/${{ secrets.MYSECRET_WAY }}/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -d "text=Action status: ${{ job.status }}"