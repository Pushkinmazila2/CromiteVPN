name: Stage 1 - Build Xray AAR

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      package_suffix:
        description: 'Package suffix (random if empty)'
        required: false
        default: ''
  push:
    paths:
      - '.github/workflows/build_xray-core.yml'

jobs:
  build-xray:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send notification
        run: echo "Job ID: ${{ github.job }} | Status: ${{ job.status }}"


      - name: Generate package name
        id: identity
        run: |
          SUFFIX="${{ inputs.package_suffix }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX=$(head -c 100 /dev/urandom | tr -dc 'a-z' | head -c 8)
          fi
          PACKAGE="com.${SUFFIX}.browser"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Package: ${PACKAGE}"

      - name: Build Docker image
        run: |
          sudo docker rmi xray-builder:latest || true
          sudo docker build -t xray-builder:latest xray-bridge/

      - name: Build Xray AAR
        run: |
          sudo docker run --rm \
            -v "$(pwd)/xray-bridge:/build" \
            -e PACKAGE_NAME="${{ steps.identity.outputs.package }}" \
            xray-builder:latest \
            bash -c '
              set -e

              echo "=== go mod tidy ===" &&
              go mod tidy &&

              echo "=== add mobile explicitly ===" &&
              go get golang.org/x/mobile/bind &&
              go get golang.org/x/mobile/cmd/gomobile &&

              echo "=== unpack mobile sources ===" &&
              MOBILE_VER=$(go list -m -json all | python3 /build/get_mobile_ver.py) &&
              echo "mobile version: $MOBILE_VER" &&
              mkdir -p $GOPATH/src/golang.org/x &&
              cp -r $GOPATH/pkg/mod/golang.org/x/mobile@${MOBILE_VER} $GOPATH/src/golang.org/x/mobile &&
              chmod -R u+w $GOPATH/src/golang.org/x/mobile &&

              echo "=== gomobile init ===" &&
              gomobile init &&

              echo "=== gomobile bind ===" &&
              gomobile bind \
                -target=android/arm64 \
                -androidapi 21 \
                -ldflags "-X xraymobile.appPackageName=${PACKAGE_NAME}" \
                -o xraymobile.aar \
                .
            '
          echo "=== AAR size ==="
          du -sh xray-bridge/xraymobile.aar
      
      - name: Send Telegram notification
        if: always()
        run: |
          MESSAGE="Статус Action: ${{ job.status }}
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Подробнее: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "http://${{ secrets.MYSECRET_IP}}:8080/${{ secrets.MYSECRET_WAY }}/${{ secrets.TELEGRAM_TOKEN }}/sendMessage"  -d "chat_id=${{ secrets.TELEGRAM_TO }}"  -d "text=Job ID: ${{ github.job }} | Status: ${{ job.status }}"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: xraymobile-aar
          path: xray-bridge/xraymobile.aar
          retention-days: 7

  build-cromite:
    needs: build-xray
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download xray AAR
        uses: actions/download-artifact@v4
        with:
          name: xraymobile-aar
          path: xray-bridge/

      - name: Pull cromite-build image
        run: |
          IMAGE="uazo/cromite-build:145.0.7632.120-d133d52d09c925b6542ff00e368d18d74df85e7c"
          sudo docker pull ${IMAGE}
          echo "CROMITE_IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build Cromite with patches
        run: |
          sudo docker run --rm \
            -v "$(pwd):/cromite-vpn" \
            -e PACKAGE_NAME="${{ needs.prepare.outputs.package }}" \
            ${CROMITE_IMAGE} \
            bash -c '
              set -e
              WORKSPACE=/home/lg/working_dir
              CHROMIUM=$WORKSPACE/chromium/src

              echo "=== Apply VPN patches ===" &&
              cd $CHROMIUM &&
              for patch in /cromite-vpn/build/patches/cromite-vpn/*.patch; do
                echo "Applying: $(basename $patch)" &&
                git am "$patch" || {
                  echo "FAILED: $patch"
                  git am --abort
                  exit 1
                }
              done &&

              echo "=== Copy Xray AAR ===" &&
              mkdir -p $CHROMIUM/chrome/android/libs &&
              cp /cromite-vpn/xray-bridge/xraymobile.aar \
                $CHROMIUM/chrome/android/libs/ &&

              echo "=== GN gen ===" &&
              PATH=$WORKSPACE/chromium/src/third_party/llvm-build/Release+Asserts/bin:$WORKSPACE/depot_tools:/usr/local/go/bin:$PATH &&
              gn gen --args="
                target_os=\"android\"
                $(cat $WORKSPACE/cromite/build/cromite.gn_args)
                target_cpu=\"arm64\"
                android_package_name=\"${PACKAGE_NAME}\"
              " out/arm64 &&

              echo "=== Build ===" &&
              vpython3 $WORKSPACE/depot_tools/siso.py ninja \
                -C out/arm64 \
                chrome_public_apk \
                --offline &&

              echo "=== Copy APK ===" &&
              cp out/arm64/apks/ChromePublic.apk /cromite-vpn/ChromePublic.apk &&
              echo "BUILD SUCCESS"
            '

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cromite-vpn-apk
          path: ChromePublic.apk
          retention-days: 7

      - name: Send Telegram notification
        if: always()
        run: |
          MESSAGE="Статус Action: ${{ job.status }}
          Репозиторий: ${{ github.repository }}
          Автор: ${{ github.actor }}
          Подробнее: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "http://${{ secrets.MYSECRET_IP}}:8080/${{ secrets.MYSECRET_WAY }}/${{ secrets.TELEGRAM_TOKEN }}/sendMessage"  -d "chat_id=${{ secrets.TELEGRAM_TO }}"  -d "text=Job ID: ${{ github.job }} | Status: ${{ job.status }}"